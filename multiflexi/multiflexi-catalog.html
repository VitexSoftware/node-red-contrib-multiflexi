<script type="text/javascript">
    RED.nodes.registerType('multiflexi-catalog', {
        category: 'MultiFlexi',
        color: '#16a085',
        defaults: {
            name: { value: '' },
            path: { value: '/multiflexi-catalog', required: true },
            appUrl: { value: '/multiflexi/' },
        },
        credentials: {
            token: { type: 'password' },
        },
        inputs: 0,
        outputs: 1,
        icon: 'multiflexi.svg',
        label: function () {
            return this.name || 'MultiFlexi catalog';
        },
    });
</script>

<script type="text/html" data-template-name="multiflexi-catalog">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="MultiFlexi catalog" />
    </div>
    <div class="form-row">
        <label for="node-input-path"><i class="fa fa-globe"></i> Path</label>
        <input type="text" id="node-input-path" placeholder="/multiflexi-catalog" />
    </div>
    <div class="form-row">
        <label for="node-input-token"><i class="fa fa-key"></i> Token</label>
        <input type="password" id="node-input-token" placeholder="(optional) X-MultiFlexi-Token" />
    </div>
    <div class="form-row">
        <label for="node-input-appUrl"><i class="fa fa-image"></i> App URL</label>
        <input type="text" id="node-input-appUrl" placeholder="/multiflexi/" />
    </div>
    <div class="form-tips">Base URL of the MultiFlexi web image endpoints
        (<code>appimage.php</code>, <code>companylogo.php</code>,
        <code>credentialimage.php</code>). Default <code>/multiflexi/</code>.</div>
</script>

<script type="text/html" data-help-name="multiflexi-catalog">
    <p>Receives the MultiFlexi configuration catalog pushed by the
    <code>multiflexi-eventor</code> daemon (set <code>NODERED_CATALOG_URL</code>
    to this node's path).</p>
    <p>Each company, enabled run-template and credential is added to the palette
    as its own node (under the <b>MultiFlexi Companies</b>,
    <b>MultiFlexi RunTemplates</b> and <b>MultiFlexi Credentials</b> categories),
    using the same icon it has in MultiFlexi.</p>
    <p><b>Reload the editor</b> after the first push to see the generated palette
    nodes.</p>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>The received catalog (<code>companies</code>, <code>runtemplates</code>, <code>credentials</code>).</dd>
    </dl>
</script>

<script type="text/javascript">
    // Build dynamic palette entries from the cached MultiFlexi catalog.
    // Each entity becomes its own node type, carrying its MultiFlexi icon.
    (function () {
        if (window.__multiflexiCatalogLoaded) {
            return;
        }
        window.__multiflexiCatalogLoaded = true;

        var KINDS = [
            { key: 'companies', prefix: 'company', prop: 'company', category: 'MultiFlexi Companies', color: '#2980b9' },
            { key: 'runtemplates', prefix: 'runtemplate', prop: 'runtemplate', category: 'MultiFlexi RunTemplates', color: '#27ae60' },
            { key: 'credentials', prefix: 'credential', prop: 'credential', category: 'MultiFlexi Credentials', color: '#8e44ad' },
        ];

        var MODULE = 'node-red-contrib-multiflexi';

        function esc(s) {
            return String(s).replace(/[&<>"]/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
            });
        }

        // Human labels for the entity fields the eventor sends (names follow the
        // MultiFlexi OpenAPI schema: Company / RunTemplate / Credential).
        var LABELS = {
            id: 'ID', slug: 'Slug', enabled: 'Enabled', code: 'Code', ic: 'IČ',
            email: 'E-mail', customer: 'Customer',
            company_id: 'Company', app_id: 'Application', app_uuid: 'App UUID',
            executor: 'Executor', interv: 'Interval', delay: 'Delay (s)',
            active: 'Active', cron: 'Cron',
            credential_type_id: 'Credential type', type_name: 'Type', type: 'Type',
        };

        // Read-only rows for the entity's scalar fields (skip icon/name internals).
        function infoRows(entity) {
            var skip = { iconFile: 1, iconUrl: 1, name: 1 };
            var rows = '';
            Object.keys(entity).forEach(function (key) {
                if (skip[key]) { return; }
                var val = entity[key];
                if (val === null || val === undefined || val === '' || typeof val === 'object') { return; }
                if (typeof val === 'boolean') { val = val ? 'yes' : 'no'; }
                rows += '<div class="form-row" style="margin-bottom:2px">' +
                    '<label style="width:130px;color:#888">' + esc(LABELS[key] || key) + '</label>' +
                    '<span>' + esc(String(val)) + '</span></div>';
            });
            return rows;
        }

        // Per-entity edit form: a large MultiFlexi logo, the name override and the
        // entity's metadata. Dynamically-registered types have no static template,
        // so without this the Properties tab renders empty.
        function buildEditTemplate(entity, label) {
            var img = '';
            if (entity.iconFile) {
                img = '<div class="form-row" style="text-align:center;margin-bottom:12px">' +
                    '<img src="icons/' + MODULE + '/' + esc(entity.iconFile) + '" alt="" ' +
                    'style="max-width:160px;max-height:160px;object-fit:contain" ' +
                    'onerror="this.style.display=\'none\'"/></div>';
            }
            return img +
                '<div class="form-row"><label for="node-input-name"><i class="fa fa-tag"></i> Name</label>' +
                '<input type="text" id="node-input-name" placeholder="' + esc(label) + '"/></div>' +
                '<hr/>' + infoRows(entity);
        }

        // node-red looks up the edit form lazily by data-template-name at edit time,
        // so injecting one script element per dynamic type is enough.
        function injectEditTemplate(type, html) {
            if (document.querySelector('script[data-template-name="' + type + '"]')) { return; }
            var tpl = document.createElement('script');
            tpl.type = 'text/html';
            tpl.setAttribute('data-template-name', type);
            tpl.innerHTML = html;
            document.body.appendChild(tpl);
        }

        $.getJSON('multiflexi-catalog/list', function (catalog) {
            // node-red serves the cached icon files (statSync at request time),
            // but the editor's isIconExists() only trusts icons registered at
            // startup. Inject the per-entity filenames into the icon set so the
            // palette renders them without a node-red restart.
            var iconSets = RED.nodes.getIconSets();
            if (!iconSets[MODULE]) { iconSets[MODULE] = []; }

            KINDS.forEach(function (k) {
                (catalog[k.key] || []).forEach(function (entity) {
                    var type = 'multiflexi-' + k.prefix + '-' + entity.id;
                    if (RED.nodes.getType(type)) {
                        return; // already registered
                    }
                    var label = entity.name || (k.prefix + ' #' + entity.id);
                    // Reference the icon module-prefixed ("<module>/<file>") so
                    // resolution does not depend on def.set (which is unreliable
                    // for types registered in this async callback); otherwise
                    // node-red falls back to the "node-red" module and the
                    // per-entity icon never renders.
                    var icon = MODULE + '/multiflexi.svg';
                    if (entity.iconFile) {
                        if (iconSets[MODULE].indexOf(entity.iconFile) === -1) {
                            iconSets[MODULE].push(entity.iconFile);
                        }
                        icon = MODULE + '/' + entity.iconFile;
                    }
                    // Provide the edit form two ways: an injected template (the
                    // node-red-native path) and, as a guarantee against template-
                    // lookup timing, build it in oneditprepare if the form is empty.
                    injectEditTemplate(type, buildEditTemplate(entity, label));
                    RED.nodes.registerType(type, {
                        category: k.category,
                        color: k.color,
                        paletteLabel: label,
                        icon: icon,
                        defaults: { name: { value: '' } },
                        inputs: 1,
                        outputs: 1,
                        label: function () { return this.name || label; },
                        oneditprepare: (function (ent, lbl) {
                            return function () {
                                var form = $('#dialog-form');
                                if (form.find('#node-input-name').length === 0) {
                                    form.html(buildEditTemplate(ent, lbl));
                                    form.find('#node-input-name').val(this.name || '');
                                }
                            };
                        })(entity, label),
                    });
                });
            });
        });
    })();
</script>
